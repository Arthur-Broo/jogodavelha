<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #38bdf8;
            --secondary: #fb7185;
            --accent: #6366f1;
            --board-size: 360px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #94a3b8;
            height: 1.5rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            width: var(--board-size);
            height: var(--board-size);
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cell {
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            position: relative;
        }

        .cell:hover {
            background: #334155;
            transform: scale(1.02);
        }

        .cell.x {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .cell.o {
            color: var(--secondary);
            text-shadow: 0 0 15px rgba(251, 113, 133, 0.5);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .controls {
            margin-top: 3rem;
        }

        button {
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .symbol-anim {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .winner-cell {
            background: rgba(99, 102, 241, 0.3) !important;
            box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* Mobile optimization */
        @media (max-width: 400px) {
            :root {
                --board-size: 300px;
            }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jogo da Velha</h1>
        <div class="status" id="statusText">Vez do Jogador X</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="resetBtn">Reiniciar Jogo</button>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        const resetBtn = document.getElementById('resetBtn');

        let currentPlayer = 'X';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive) return;

            updateCell(clickedCell, clickedCellIndex);
            checkResult();
        }

        function updateCell(cell, index) {
            gameState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add('taken');
            cell.classList.add(currentPlayer.toLowerCase());
            
            // Add animation class
            const span = document.createElement('span');
            span.className = 'symbol-anim';
            span.innerText = currentPlayer;
            cell.innerHTML = '';
            cell.appendChild(span);
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = null;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = `Jogador ${currentPlayer} Venceu! 🎉`;
                statusText.style.color = currentPlayer === 'X' ? 'var(--primary)' : 'var(--secondary)';
                gameActive = false;
                highlightWinner(winningLine);
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusText.innerText = "Empate! 🤝";
                statusText.style.color = "#94a3b8";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = `Vez do Jogador ${currentPlayer}`;
        }

        function highlightWinner(line) {
            line.forEach(index => {
                cells[index].classList.add('winner-cell');
            });
        }

        function resetGame() {
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusText.innerText = "Vez do Jogador X";
            statusText.style.color = "#94a3b8";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
